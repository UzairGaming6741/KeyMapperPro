name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v2
      - name: Install NDK
        run: echo "y" | sdkmanager "ndk;25.2.9519653" "cmake;3.22.1"
      - name: Unzip project
        run: unzip KeyMapperProV2.zip
      - name: Build APK
        run: cd KeyMapperV2 && chmod +x gradlew && ./gradlew assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: KeyMapperPro-APK
          path: KeyMapperV2/app/build/outputs/apk/debug/app-debug.apk
